<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VQA + GradCAM Dashboard</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            margin: 0;
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0px 8px 24px rgba(0,0,0,0.08);
        }

        h1 {
            text-align: center;
            color: #1a1a1a;
            margin-top: 0;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media (min-width: 768px) {
            .main-layout {
                grid-template-columns: 1fr 1fr;
            }
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
            color: #4a5568;
        }

        input[type="file"] {
            padding: 10px;
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }

        textarea {
            width: 100%;
            resize: vertical;
            padding: 12px;
            min-height: 110px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: #007bff;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            transition: background 0.2s;
        }

        button:hover {
            background: #0056b3;
        }

        .preview-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f8fafc;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #e2e8f0;
            min-height: 250px;
        }

        .preview-box img {
            max-width: 100%;
            max-height: 280px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .result-card {
            background: #f0f7ff;
            border-left: 6px solid #007bff;
            padding: 24px;
            border-radius: 0 12px 12px 0;
            height: 100%;
        }

        .result-card h2 {
            margin-top: 0;
            color: #004085;
            font-size: 20px;
        }

        .prediction-text {
            font-size: 18px;
            font-weight: bold;
            color: #1e293b;
            background: white;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #d0e3ff;
            margin-bottom: 20px;
        }

        .visualizer img {
            width: 100%;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            margin-top: 10px;
        }

        .images-container {
            display: flex;
            gap: 10px;
        }

        .images-container img {
            width: calc(50% - 5px);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Visual Question Answering</h1>

    <div style="text-align:center; margin-bottom: 20px;">
        <a href="/tsne" style="
            display:inline-block;
            padding:10px 18px;
            background:#007bff;
            color:white;
            border-radius:8px;
            text-decoration:none;
            font-weight:600;">
            Ir a t-SNE Dashboard
        </a>
    </div>


    <div class="main-layout">
        <div>
            <form action="/predict" method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Imagen de Entrada</label>
                    <input 
                        type="file" 
                        name="image" 
                        accept="image/*" 
                        required 
                        onchange="previewImage(event)"
                    >
                </div>

                <div class="form-group">
                    <label>Pregunta sobre la imagen</label>
                    <textarea 
                        name="question" 
                        placeholder="Ejemplo: what color is the shape?" 
                        required
                    ></textarea>
                </div>

                <button type="submit">Ejecutar Inferencia</button>
            </form>
        </div>

        <div class="preview-box" id="placeholderBox">
            <img id="preview" class="hidden" alt="Previsualización">
            
            {% if answer %}
                <div class="result-card" id="resultCard">
                    <h2>Respuesta del Modelo</h2>
                    <p class="prediction-text">{{ answer }}</p>

                    <div class="visualizer">
                        <label>Atención Visual (Grad-CAM)</label>
                        {% if loaded %}
                        <div class="images-container">
                            <img id="Original" src="/get_image" alt="Original">
                            <img id="gradCamImage" src="/get_heatmap" alt="GradCAM Overlay">
                        </div>
                        {% endif %}
                    </div>
                </div>
            {% else %}
                <p id="uploadPrompt" style="color: #64748b;">Sube una imagen y realiza una pregunta para ver la activación.</p>
            {% endif %}
        </div>
    </div>
</div>

</body>
</html>
